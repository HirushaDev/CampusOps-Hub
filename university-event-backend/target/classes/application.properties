spring.application.name=university-event-management-system

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/university_events_db
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Server Configuration
server.port=8080
server.servlet.context-path=/api

# JWT Secret Key (Generate a strong random key in production)
jwt.secret=universityEventManagementSystemSecretKeyForJWTEncodingAndDecodingTheTokens2024

# JWT Expiration (24 hours in milliseconds)
jwt.expiration=86400000

# CORS Configuration
spring.web.cors.allowed-origins=http://localhost:3000
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# Logging
logging.level.root=INFO
logging.level.com.university=DEBUG
